# Base / dev compose. Postgres + Redis exposed on localhost; source mounted for hot-reload;
# no Caddy — use ngrok or direct port for Telegram in dev.
#
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: jarvis
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: [.env]
    environment:
      ENV: dev
      LOG_FORMAT: pretty
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://jarvis:jarvis@postgres:5432/jarvis
    volumes:
      - ./src:/app/src
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command:
      - uvicorn
      - jarvis.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: [.env]
    environment:
      ENV: dev
      LOG_FORMAT: pretty
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://jarvis:jarvis@postgres:5432/jarvis
    volumes:
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - jarvis.workers.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2

volumes:
  redis-data:
  postgres-data:
